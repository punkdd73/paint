<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal Art Portfolio">
    <title>Art Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="header-container">
            <h1>Portfolio</h1>
            <nav>
                <a href="#gallery">Works</a>
                <a href="#about">About</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <h2>鍾佳惠藝廊</h2>
            <p>歡迎來到我的藝廊，我都亂畫</p>
        </section>

        <section id="gallery" class="gallery">
            <div class="grid">
                <!-- 將下方的 src 替換為您自己的圖片路徑，例如：assets/image1.jpg -->
                <div class="art-item" onclick="openLightbox('assets/placeholder.jpg')">
                    <img src="\assets/image1.png" alt="Artwork 1"
                        loading="lazy">
                    <div class="art-caption">Title of Work 1</div>
                </div>
                <div class="art-item" onclick="openLightbox('assets/placeholder.jpg')">
                    <img src="\assets/image2.png" alt="Artwork 2"
                        loading="lazy">
                    <div class="art-caption">Title of Work 2</div>
                </div>
                <div class="art-item" onclick="openLightbox('assets/placeholder.jpg')">
                    <img src="\assets/image3.jpg" alt="Artwork 3"
                        loading="lazy">
                    <div class="art-caption">Title of Work 3</div>
                </div>
            </div>
        </section>

        <section id="about" class="about">
            <h2>About the Artist</h2>
            <p>I am an artist exploring minimalist concepts and abstract ideas through various mediums.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Art Portfolio. All rights reserved.</p>
    </footer>

    <!-- Lightbox for viewing full images -->
    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script src="script.js"></script>
</body>

</html>
